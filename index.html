<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>La Blanche d'Olivier</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --fire-orange: #e8621a;
      --fire-red: #8b1a0a;
      --lava: #f5c800;
      --ember: #ff6b00;
      --ash: #2a2825;
      --dark: #080604;
      --smoke: #141210;
      --gold: #c8880a;
      --stone: #4a3828;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      min-height: 100vh;
      overflow-x: hidden;
      background: var(--dark);
    }

    body {
      font-family: 'Cinzel', serif;
      color: #c8a882;
    }

    /* Volcanic background */
    .bg-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 80% 50% at 70% 60%, rgba(180, 50, 5, 0.18) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 20% 70%, rgba(100, 20, 2, 0.15) 0%, transparent 60%),
        radial-gradient(ellipse 100% 80% at 50% 100%, rgba(80, 20, 0, 0.4) 0%, transparent 60%),
        linear-gradient(to bottom, #0c0806 0%, #100a04 40%, #1a0c04 70%, #0a0604 100%);
    }

    /* Animated lava glow at bottom */
    .bg-lava-glow {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 30%;
      background: radial-gradient(ellipse 60% 100% at 65% 100%, rgba(200, 80, 5, 0.12) 0%, transparent 70%);
      animation: lavaBreath 5s ease-in-out infinite;
      z-index: 0;
    }

    @keyframes lavaBreath {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    /* Particle canvas */
    #particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    /* Mountain silhouette */
    .mountain-svg {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      pointer-events: none;
      z-index: 1;
    }

    /* Main content */
    .page {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2.5rem 1.25rem 4rem;
    }

    /* — EYE — */
    .eye-wrap {
      margin-bottom: 1.5rem;
      animation: eyePulse 3.5s ease-in-out infinite;
      filter: drop-shadow(0 0 18px rgba(255, 100, 0, 0.7));
    }

    @keyframes eyePulse {
      0%, 100% { filter: drop-shadow(0 0 12px rgba(255, 80, 0, 0.6)); }
      50%       { filter: drop-shadow(0 0 30px rgba(255, 160, 0, 0.9)) drop-shadow(0 0 60px rgba(200, 50, 0, 0.5)); }
    }

    /* — TITLE — */
    .title {
      font-family: 'Cinzel Decorative', serif;
      font-weight: 900;
      font-size: clamp(1.4rem, 6vw, 3rem);
      color: #d47c0a;
      text-align: center;
      text-shadow: 0 0 15px #ff6b00, 0 0 35px #cc4400, 0 0 70px #881100;
      letter-spacing: 0.08em;
      line-height: 1.2;
      margin-bottom: 0.4rem;
    }

    .subtitle {
      font-size: clamp(0.6rem, 2vw, 0.78rem);
      color: #6a5035;
      text-align: center;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      margin-bottom: 2.5rem;
    }

    /* — DIVIDER — */
    .rune-divider {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      width: 100%;
      max-width: 460px;
      margin-bottom: 2rem;
    }

    .rune-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, #5a2c10, #8b4a1a, #5a2c10, transparent);
    }

    .rune-gem {
      width: 8px;
      height: 8px;
      background: #8b4a1a;
      transform: rotate(45deg);
      box-shadow: 0 0 8px rgba(255, 100, 0, 0.4);
    }

    /* — CONTENT FRAME — */
    .frame-outer {
      width: 100%;
      max-width: 480px;
      margin-bottom: 2.5rem;
      position: relative;
    }

    /* Corner ornaments */
    .frame-outer::before,
    .frame-outer::after {
      content: '';
      position: absolute;
      width: 24px;
      height: 24px;
      border-color: #c87820;
      border-style: solid;
      z-index: 3;
    }
    .frame-outer::before { top: -3px; left: -3px; border-width: 3px 0 0 3px; }
    .frame-outer::after  { bottom: -3px; right: -3px; border-width: 0 3px 3px 0; }

    .frame-inner-tl,
    .frame-inner-br {
      position: absolute;
      width: 24px;
      height: 24px;
      border-color: #5a3010;
      border-style: solid;
      z-index: 3;
    }
    .frame-inner-tl { top: -3px; right: -3px; border-width: 3px 3px 0 0; }
    .frame-inner-br { bottom: -3px; left: -3px; border-width: 0 0 3px 3px; }

    .frame-box {
      border: 1px solid #4a2008;
      background: #060402;
      animation: frameGlow 4.5s ease-in-out infinite;
      outline: 1px solid #2a1204;
      outline-offset: 3px;
    }

    @keyframes frameGlow {
      0%, 100% { box-shadow: 0 0 25px rgba(120, 50, 5, 0.25), inset 0 0 30px rgba(0,0,0,0.6); }
      50%       { box-shadow: 0 0 45px rgba(200, 90, 15, 0.4), 0 0 80px rgba(150, 50, 5, 0.2), inset 0 0 30px rgba(0,0,0,0.6); }
    }

    .content-area {
      min-height: 280px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #050302;
      position: relative;
    }

    .content-area img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: cover;
    }

    .content-area iframe {
      width: 100%;
      aspect-ratio: 16/9;
      border: none;
      display: block;
    }

    /* Loading / error states */
    .state-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      padding: 3rem 2rem;
      color: #5a3010;
    }

    .state-text {
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-align: center;
      animation: breathText 2s ease-in-out infinite;
      line-height: 1.8;
    }

    @keyframes breathText {
      0%, 100% { opacity: 0.4; }
      50%       { opacity: 0.9; }
    }

    /* Frame footer */
    .frame-footer {
      padding: 0.5rem 1rem;
      background: #060402;
      border-top: 1px solid #2a1204;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.62rem;
      color: #4a2c10;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .frame-counter {
      background: rgba(50, 20, 5, 0.8);
      border: 1px solid #3a1a08;
      padding: 0.15rem 0.5rem;
      font-size: 0.58rem;
      letter-spacing: 0.1em;
    }

    /* — FOOTER — */
    .page-footer {
      font-size: 0.58rem;
      color: #2a1608;
      letter-spacing: 0.3em;
      text-align: center;
      margin-top: 1rem;
    }

    /* — RESPONSIVE — */
    @media (max-width: 400px) {
      .page { padding: 1.5rem 0.8rem 3rem; }
    }
  </style>
</head>
<body>

<!-- Background layers -->
<div class="bg-layer"></div>
<div class="bg-lava-glow"></div>

<!-- Particle system canvas -->
<canvas id="particles"></canvas>

<!-- Mountain & Tower silhouette (inspired by the painting) -->
<svg class="mountain-svg" viewBox="0 0 1200 260" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMax meet">
  <defs>
    <radialGradient id="lavaGlow" cx="65%" cy="100%" r="40%">
      <stop offset="0%" stop-color="#c84a05" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#c84a05" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Lava glow behind Mount Doom -->
  <ellipse cx="780" cy="260" rx="220" ry="80" fill="url(#lavaGlow)"/>
  <!-- Mount Doom -->
  <path d="M1200 260 L920 260 L780 55 L740 100 L720 70 L695 110 L665 260 Z" fill="#080604"/>
  <!-- Lava stream on mountain -->
  <path d="M780 55 L790 120 L782 190 L788 260" stroke="#e85a05" stroke-width="3" fill="none" opacity="0.2"/>
  <path d="M780 55 L785 150 L780 210 L783 260" stroke="#ffaa00" stroke-width="1.5" fill="none" opacity="0.15"/>
  <!-- Barad-dûr tower (left) -->
  <path d="
    M0 260 L180 260
    L200 220 L195 210 L205 200 L195 185
    L205 160 L195 148
    L200 100 L205 92 L200 45 L196 50 L192 42 L188 50 L184 42 L181 50 L177 42
    L173 50 L170 45 L165 92 L170 100
    L162 148 L172 160 L162 185 L172 200 L162 210 L168 220
    L145 260
    Z" fill="#080604"/>
  <!-- Eye of Sauron glow (top of tower) -->
  <ellipse cx="185" cy="42" rx="18" ry="10" fill="#ff6b00" opacity="0.15"/>
  <ellipse cx="185" cy="42" rx="10" ry="6" fill="#ff8800" opacity="0.1"/>
  <!-- Flying Nazgûl -->
  <path d="M380 90 Q385 82 395 85 Q390 78 400 80 Q405 73 415 77 Q410 84 420 82" fill="none" stroke="#1a0d06" stroke-width="1.5" opacity="0.5"/>
  <path d="M395 85 L395 92" stroke="#1a0d06" stroke-width="1" opacity="0.5"/>
  <!-- Foreground rocks -->
  <path d="M0 260 L0 235 L40 218 L70 228 L110 210 L140 224 L165 260 Z" fill="#060402"/>
  <path d="M640 260 L650 240 L680 230 L700 242 L730 232 L750 245 L780 260 Z" fill="#060402"/>
  <path d="M970 260 L985 242 L1015 250 L1050 235 L1090 248 L1130 238 L1200 248 L1200 260 Z" fill="#060402"/>
  <!-- Hobbits silhouettes (foreground) -->
  <ellipse cx="300" cy="245" rx="12" ry="15" fill="#080604"/>
  <circle cx="300" cy="228" r="7" fill="#080604"/>
  <ellipse cx="330" cy="240" rx="10" ry="12" fill="#080604"/>
  <circle cx="332" cy="226" r="6" fill="#080604"/>
  <ellipse cx="356" cy="237" rx="10" ry="14" fill="#080604"/>
  <circle cx="358" cy="222" r="6" fill="#080604"/>
</svg>

<!-- Page content -->
<div class="page">

  <!-- Eye of Sauron -->
  <div class="eye-wrap">
    <svg viewBox="0 0 140 70" xmlns="http://www.w3.org/2000/svg" width="140" height="70">
      <defs>
        <radialGradient id="irisGrad" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#ffcc00"/>
          <stop offset="35%" stop-color="#ff7700"/>
          <stop offset="70%" stop-color="#cc2200"/>
          <stop offset="100%" stop-color="#661100" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="pupilGrad" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#000000"/>
          <stop offset="100%" stop-color="#1a0500"/>
        </radialGradient>
      </defs>
      <!-- Outer aura -->
      <ellipse cx="70" cy="35" rx="65" ry="32" fill="url(#irisGrad)" opacity="0.25"/>
      <!-- Iris base -->
      <ellipse cx="70" cy="35" rx="48" ry="24" fill="#bb3300"/>
      <!-- Flame petals -->
      <path d="M22 35 Q42 8 70 14 Q98 8 118 35 Q98 62 70 56 Q42 62 22 35Z" fill="#ee5500"/>
      <path d="M28 35 Q46 14 70 18 Q94 14 112 35 Q94 56 70 52 Q46 56 28 35Z" fill="#ff8800" opacity="0.7"/>
      <path d="M32 35 Q48 18 70 21 Q92 18 108 35 Q92 52 70 49 Q48 52 32 35Z" fill="#ffcc00" opacity="0.25"/>
      <!-- Inner fire lines -->
      <path d="M22 35 Q42 20 70 22" fill="none" stroke="#ffaa00" stroke-width="0.7" opacity="0.5"/>
      <path d="M118 35 Q98 20 70 22" fill="none" stroke="#ffaa00" stroke-width="0.7" opacity="0.5"/>
      <!-- Eyelid lines -->
      <path d="M22 35 Q46 12 70 16 Q94 12 118 35" fill="none" stroke="#6b1a00" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M22 35 Q46 58 70 54 Q94 58 118 35" fill="none" stroke="#6b1a00" stroke-width="1.5" stroke-linecap="round"/>
      <!-- Pupil (vertical slit) -->
      <ellipse cx="70" cy="35" rx="9" ry="21" fill="url(#pupilGrad)"/>
      <ellipse cx="70" cy="35" rx="3" ry="8" fill="#000"/>
      <!-- X mark (like in the painting) -->
      <line x1="65" y1="30" x2="75" y2="40" stroke="#aa1100" stroke-width="1" opacity="0.8"/>
      <line x1="75" y1="30" x2="65" y2="40" stroke="#aa1100" stroke-width="1" opacity="0.8"/>
      <!-- Flame tips -->
      <path d="M70 6 L67 14 L70 10 L73 14 Z" fill="#ffdd00"/>
      <path d="M36 14 L40 21 L38 18 L42 23 Z" fill="#ff8800" opacity="0.6"/>
      <path d="M104 14 L100 21 L102 18 L98 23 Z" fill="#ff8800" opacity="0.6"/>
    </svg>
  </div>

  <!-- Title -->
  <h1 class="title">La Blanche d'Olivier</h1>
  <p class="subtitle">Une vision des terres sombres</p>

  <!-- Divider -->
  <div class="rune-divider">
    <div class="rune-line"></div>
    <div class="rune-gem"></div>
    <div class="rune-line"></div>
  </div>

  <!-- Content frame -->
  <div class="frame-outer">
    <div class="frame-inner-tl"></div>
    <div class="frame-inner-br"></div>
    <div class="frame-box">
      <div class="content-area" id="contentArea">
        <div class="state-box" id="stateBox">
          <!-- Eye mini -->
          <svg viewBox="0 0 80 40" xmlns="http://www.w3.org/2000/svg" width="70" height="35" style="animation:eyePulse 2s ease-in-out infinite;filter:drop-shadow(0 0 8px rgba(255,100,0,0.5))">
            <ellipse cx="40" cy="20" rx="28" ry="14" fill="#bb3300"/>
            <path d="M12 20 Q26 6 40 9 Q54 6 68 20 Q54 34 40 31 Q26 34 12 20Z" fill="#ee5500"/>
            <ellipse cx="40" cy="20" rx="6" ry="13" fill="#000"/>
          </svg>
          <span class="state-text" id="stateText">L'Œil observe...</span>
        </div>
      </div>
      <div class="frame-footer">
        <span id="contentLabel">— Vision du Mordor —</span>
        <span class="frame-counter" id="contentCounter"></span>
      </div>
    </div>
  </div>

  <div class="page-footer">
    ᛚᚨ ᛒᛚᚨᚾᚲᚺᛖ ᛞ'ᛟᛚᛁᚢᛁᛖᚱ · ᚨᛋᚺ ᚾᚨᛉᚷ ᛞᚢᚱᛒᚨᛏᚢᛚᚢᚴ
  </div>

</div>

<script>
/* ═══════════════════════════════════════════════════════
   ⚙ CONFIGURATION — à remplir
   ═══════════════════════════════════════════════════════ */
const API_KEY   = 'AIzaSyCPk9aYtM_0QQjGg_Jt4ikb0vN1RSmRxlw';        // Votre clé API Google Drive
const FOLDER_ID = '1XvEkEuKTqvmqmBVqk8-AdgK6l0NXxs6F';        // L'ID du dossier Drive
const MODE      = 'random';  // 'random' | 'latest' | 'sequential'

/* ═══════════════════════════════════════════════════════
   PARTICLE SYSTEM — cendres et braises
   ═══════════════════════════════════════════════════════ */
const canvas = document.getElementById('particles');
const ctx    = canvas.getContext('2d');
let W, H, particles = [];

function resizeCanvas() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

function mkParticle() {
  const isEmber = Math.random() > 0.75;
  return {
    x:     Math.random() * W,
    y:     -8,
    size:  Math.random() * (isEmber ? 2.5 : 1.5) + 0.4,
    vy:    Math.random() * 0.7 + 0.15,
    vx:    (Math.random() - 0.5) * 0.4,
    op:    Math.random() * 0.55 + 0.1,
    color: isEmber
      ? (Math.random() > 0.5 ? '#ff6b00' : '#ffaa00')
      : (Math.random() > 0.5 ? '#3a2818' : '#5a3820'),
    glow:  isEmber,
    wob:   Math.random() * Math.PI * 2,
    wobV:  (Math.random() - 0.5) * 0.025,
  };
}

function animLoop() {
  ctx.clearRect(0, 0, W, H);

  if (particles.length < 90 && Math.random() < 0.35) particles.push(mkParticle());

  particles = particles.filter(p => {
    p.y    += p.vy;
    p.x    += p.vx + Math.sin(p.wob) * 0.25;
    p.wob  += p.wobV;
    p.op   *= 0.9985;
    return p.y < H + 10 && p.op > 0.008;
  });

  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = p.op;
    if (p.glow) { ctx.shadowColor = p.color; ctx.shadowBlur = 7; }
    ctx.fillStyle = p.color;
    ctx.beginPath();
    if (p.size > 1.8) {
      ctx.ellipse(p.x, p.y, p.size, p.size * 0.55, p.wob, 0, Math.PI * 2);
    } else {
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    }
    ctx.fill();
    ctx.restore();
  }

  requestAnimationFrame(animLoop);
}

window.addEventListener('resize', resizeCanvas);
resizeCanvas();
animLoop();

/* ═══════════════════════════════════════════════════════
   GOOGLE DRIVE API
   ═══════════════════════════════════════════════════════ */
async function fetchAndDisplay() {
  setState('L\'Œil scrute les archives...');

  try {
    const q   = encodeURIComponent(`'${FOLDER_ID}' in parents and trashed=false`);
    const fld = encodeURIComponent('files(id,name,mimeType,createdTime)');
    const url = `https://www.googleapis.com/drive/v3/files?q=${q}&fields=${fld}&orderBy=createdTime%20desc&pageSize=50&key=${API_KEY}`;

    const res  = await fetch(url);
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err?.error?.message || `HTTP ${res.status}`);
    }

    const data  = await res.json();
    const files = (data.files || []).filter(f =>
      f.mimeType.startsWith('image/') ||
      f.mimeType.startsWith('video/') ||
      f.mimeType === 'application/vnd.google-apps.video'
    );

    if (!files.length) {
      setState('Le dossier est vide.\nAjoutez des images ou vidéos dans votre dossier Drive.');
      return;
    }

    let idx;
    if (MODE === 'latest') {
      idx = 0;
    } else if (MODE === 'sequential') {
      const seq = parseInt(sessionStorage.getItem('lbo_seq') || '0');
      idx = seq % files.length;
      sessionStorage.setItem('lbo_seq', String(idx + 1));
    } else {
      idx = Math.floor(Math.random() * files.length);
    }

    renderFile(files[idx], idx + 1, files.length);

  } catch (e) {
    console.error(e);
    setState('Erreur Drive : ' + e.message);
  }
}

function renderFile(file, pos, total) {
  const area    = document.getElementById('contentArea');
  const label   = document.getElementById('contentLabel');
  const counter = document.getElementById('contentCounter');

  counter.textContent = `${pos} / ${total}`;

  if (file.mimeType.startsWith('image/')) {
    label.textContent = '— Vision —';
    /* Try thumbnail first; fall back to iframe */
    const img = new Image();
    img.style.cssText = 'width:100%;height:auto;display:block;';
    img.alt = file.name;
    img.onload = () => { area.innerHTML = ''; area.appendChild(img); };
    img.onerror = () => {
      area.innerHTML = `<iframe src="https://drive.google.com/file/d/${file.id}/preview" style="width:100%;aspect-ratio:4/3;border:none;" allowfullscreen></iframe>`;
    };
    img.src = `https://drive.google.com/thumbnail?id=${file.id}&sz=w1200`;
  } else {
    label.textContent = '— Récit —';
    area.innerHTML = `<iframe src="https://drive.google.com/file/d/${file.id}/preview" style="width:100%;aspect-ratio:16/9;border:none;" allowfullscreen allow="autoplay"></iframe>`;
  }
}

function setState(text) {
  const box = document.getElementById('stateBox');
  const t   = document.getElementById('stateText');
  if (box) box.style.display = 'flex';
  if (t)   t.textContent = text;
}

/* ═══════════════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════════════ */
window.addEventListener('load', () => fetchAndDisplay());
</script>
</body>
</html>
